<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>I Love You 💕</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- PHASE 1: COUNTDOWN + LOVE RAIN -->
  <div id="phase1" class="phase active">
    <canvas id="rainCanvas"></canvas>
    <div id="countdown" class="countdown"></div>
  </div>

  <!-- PHASE 2: I LOVE YOU + HEART SLIDESHOW -->
  <div id="phase2" class="phase">
    <canvas id="fwCanvas"></canvas>
    <div class="float-layer" id="floatLayer2"></div>

    <!-- SVG heart clip hidden -->
    <svg width="0" height="0" style="position:absolute">
      <defs>
        <clipPath id="heartClip" clipPathUnits="objectBoundingBox">
          <!-- normalized 0-1 heart path -->
          <path d="M0.5,0.25
            C0.5,0.1 0.35,0 0.25,0.07
            C0.1,0.15 0,0.3 0,0.47
            C0,0.72 0.25,0.87 0.5,1
            C0.75,0.87 1,0.72 1,0.47
            C1,0.3 0.9,0.15 0.75,0.07
            C0.65,0 0.5,0.1 0.5,0.25 Z"/>
        </clipPath>
      </defs>
    </svg>

    <div class="heart-wrap">
      <div class="heart-clip-box" id="heartBox">
        <img class="heart-photo active" src="oline.jpg"  alt=""/>
        <img class="heart-photo"        src="oline2.jpg" alt=""/>
        <img class="heart-photo"        src="oline3.jpg" alt=""/>
        <img class="heart-photo"        src="oline4.jpg" alt=""/>
        <img class="heart-photo"        src="oline5.jpg" alt=""/>
        <img class="heart-photo"        src="oline6.jpg" alt=""/>
      </div>
    </div>

    <div class="iloveyou-text">I Love You 💕</div>
  </div>

  <!-- PHASE 3: YOU ARE THE BEST -->
  <div id="phase3" class="phase">
    <canvas id="finalCanvas"></canvas>
    <div class="float-layer" id="floatLayer3"></div>
    <div class="final-wrap">
      <div class="final-title">You Are The Best</div>
      <div class="final-hearts">💕 💖 💗 💓 💞</div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
